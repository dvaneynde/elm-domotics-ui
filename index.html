<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Domotics</title>
</head>
<body>
    <div id="app"></div>
    <script src="domotic.js"></script>
    <script>
        var app = Elm.Domotic.init({ node: document.getElementById('app') });

        // Elm tells us the WebSocket URL (derived from fixBackendHostPort or the page URL)
        app.ports.connectWebSocket.subscribe(function(wsUrl) {
            function connect() {
                var ws = new WebSocket(wsUrl);

                ws.onmessage = function(event) {
                    app.ports.newStatusViaWs.send(event.data);
                };

                ws.onclose = function() {
                    console.log('WebSocket closed, reconnecting in 5s...');
                    setTimeout(connect, 5000);
                };

                ws.onerror = function(error) {
                    console.error('WebSocket error:', error);
                };
            }
            connect();
        });
    </script>
</body>
</html>
